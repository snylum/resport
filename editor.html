<!DOCTYPE html>
<html lang="en" data-theme="dazed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Résumé Editor — Premium Engine</title>
  <link rel="stylesheet" href="dazed.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="editor.css" />
  <style>
    /* ── EDITOR HEADER, REBUILT ON THE SITE-NAV PATTERN ────────
       index.html's original header is <nav class="site-nav">:
       .nav-logo on the left, a single <ul class="nav-links"> on
       the right, both already styled by styles.css. This reuses
       those exact classes here instead of a bespoke toolbar
       layout — same skeleton, same spacing rules (nav-links'
       1.5rem gap), same .btn/.btn-ghost/.btn-primary components —
       so the two headers are genuinely built from the same parts.

       The outer element keeps the .editor-toolbar class so
       editor.css's real sizing still applies (68px height, 3px
       border, var(--color-surface) background) — only what's
       inside it changes shape.

       Color: the marketing nav's CTA (Open Editor) uses
       --color-primary (hot pink). Publish reuses the same button
       component but in --color-secondary (violet) instead, so the
       editor's primary action reads as distinct from the
       marketing page's, while still belonging to the same theme. */

    .mode-tabs {
      display: flex;
      gap: 0.25rem;
      border: 2px solid var(--color-border);
      background: var(--color-surface-alt);
      padding: 0.2rem;
    }

    .mode-tab {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.8rem;
      border: none;
      background: transparent;
      color: var(--color-text-muted);
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-tab:hover {
      color: var(--color-text);
    }

    .mode-tab.active {
      background: var(--color-accent);
      color: var(--color-text);
    }

    .toolbar-filename {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-text);
      padding: 0.4rem 0.6rem;
      border: 2px solid transparent;
      outline: none;
      max-width: 20ch;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-filename:focus {
      border-color: var(--color-border);
      background: var(--color-surface-alt);
    }

    /* Publish button: same .btn component, violet instead of the
       marketing page's pink, so it's visibly a different action
       family even though it's built the same way. */
    .btn-secondary {
      background: var(--color-secondary);
      color: #fff;
      box-shadow: var(--shadow);
    }
    .btn-secondary:hover {
      box-shadow: var(--shadow-lg);
      transform: translate(-2px, -2px);
    }

    /* The lifted-button hover trick now lives in styles.css as a generic
       .nav-links .btn.btn-sm rule (not just btn-primary), so it applies
       automatically to every button in this toolbar's nav-links — PDF,
       Portfolio, and Publish all sit on the exact same baseline as the
       marketing nav's CTA, no per-button override needed here anymore. */

    /* editor.html has more items than the marketing nav (mode tabs +
       filename + three buttons vs three links), so a divider marks
       the boundary between "file identity" and "actions" instead of
       relying on gap alone to communicate grouping. */
    .toolbar-divider {
      width: 2px;
      align-self: stretch;
      background: var(--color-border);
      margin: 0.5rem 0;
    }

    @media (max-width: 780px) {
      .toolbar-filename {
        display: none;
      }
    }
  </style>
</head>
<body>

  <header class="editor-toolbar">
    <a href="index.html" class="nav-logo"><span class="logo-dot"></span>proves.work</a>
    <ul class="nav-links">
      <li>
        <div class="mode-tabs" role="tablist">
          <button class="mode-tab active" id="tabEditBtn">Edit</button>
          <button class="mode-tab" id="tabCustomizeBtn">Customize</button>
        </div>
      </li>
      <li>
        <span class="toolbar-filename" id="resumeTitle" contenteditable="true" spellcheck="false">Untitled résumé</span>
      </li>
      <li class="toolbar-divider" aria-hidden="true"></li>
      <li><button class="btn btn-ghost btn-sm" id="btnDownloadPDF">⬇ PDF</button></li>
      <li><button class="btn btn-ghost btn-sm" id="btnOpenPortfolio">🌐 Portfolio</button></li>
      <li><button class="btn btn-secondary btn-sm" id="btnPublishShowcase">✦ Publish</button></li>
    </ul>
  </header>

  <main class="editor-workspace">
    
    <section class="editor-sidebar" id="editorSidebar">
      
      <div class="sidebar-panel active" id="panelEdit">
        <div class="panel-scroll-container">
          
          <div class="form-section active">
            <button class="form-section-toggle" type="button">
              <span class="fs-title">Personal Details</span>
              <span class="fs-chevron">▼</span>
            </button>
            <div class="form-section-content">
              <div class="form-grid">
                <div class="field-box full-width">
                  <label>Wanted Job Title</label>
                  <input type="text" id="inJobTitle" placeholder="e.g. Software Engineer" />
                </div>
                <div class="field-box">
                  <label>First Name</label>
                  <input type="text" id="inFirstName" />
                </div>
                <div class="field-box">
                  <label>Last Name</label>
                  <input type="text" id="inLastName" />
                </div>
                <div class="field-box">
                  <label>Email</label>
                  <input type="email" id="inEmail" />
                </div>
                <div class="field-box">
                  <label>Phone</label>
                  <input type="tel" id="inPhone" />
                </div>
                <div class="field-box">
                  <label>Address</label>
                  <input type="text" id="inAddress" />
                </div>
                <div class="field-box" id="photoUploadBox">
                  <label>Photo</label>
                  <div class="photo-input-row">
                    <div class="photo-preview-placeholder" id="photoSidebarPreview"></div>
                    <label class="btn btn-ghost btn-sm btn-file">
                      Upload Image <input type="file" id="inPhoto" accept="image/*" style="display:none;" />
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="sections-manager-wrap">
            <h3 class="sm-title">Résumé Sections</h3>
            <p class="sm-subtitle">Drag to reorder sections. Click to modify block parameters.</p>
            <div class="sections-drag-list" id="sidebarSectionsList">
              </div>
          </div>
          
        </div>
      </section>

      <div class="sidebar-resizer" id="sidebarResizer"></div>

      <section class="editor-canvas" id="canvasWrap">
        <div class="canvas-container">
          <div class="resume-paper" id="resumePaper" data-layout="1" data-header-align="left" data-date-align="right" data-skills-layout="pills">
            
            <header class="rb-header" id="canvasHeader">
              <div class="rb-header-photo-wrap hidden" id="canvasPhotoWrap">
                <img src="" alt="Profile" id="canvasPhotoImg" />
              </div>
              <div class="rb-header-text">
                <h1 class="rb-name" id="canvasName">Juan Lala</h1>
                <div class="rb-title" id="canvasJobTitle"></div>
                <div class="rb-contact-line" id="canvasContactLine"></div>
              </div>
            </header>

            <div id="canvasTracks" class="tracks-layout-1">
              <div class="col-track main-track" id="mainTrack"></div>
              <div class="col-track side-track hidden" id="sideTrack"></div>
            </div>

          </div>
        </div>
      </section>

  </main>

  <script type="module" src="editor.js"></script>
</body>
</html>
