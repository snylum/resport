<!DOCTYPE html>
<html lang="en" data-theme="dazed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Résumé Editor — Premium Engine</title>
  <link rel="stylesheet" href="dazed.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="editor.css" />
  <style>
    /* ── EDITOR TOOLBAR, RESHAPED AS A NAV-LIST ────────────────
       index.html's original header was a <nav class="site-nav">:
       logo on the left, everything else living inside a single
       <ul class="nav-links"> pushed to the right with flex. This
       reproduces that exact skeleton for editor.html — logo left,
       one <ul> right — instead of the old three-region toolbar
       layout (logo / center tabs / right actions). The editor's
       own controls (mode tabs, filename, PDF/Portfolio/Publish)
       all move inside as <li> items so nothing functional changes,
       only the container shape.

       Colors are deliberately different from the marketing nav:
       this is a working surface, not a storefront, so it gets a
       dark slate bar with light text instead of a white bar with
       an indigo accent — same skeleton, different register. */
    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      padding: 0 1.75rem;
      background: #17181c;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .editor-toolbar .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 800;
      font-size: 1.05rem;
      color: #f4f4f5;
      text-decoration: none;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .editor-toolbar .nav-logo .logo-dot {
      background: #22d3ee; /* teal accent — distinct from the marketing page's indigo */
    }

    .toolbar-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 1.75rem; /* enough room that mode tabs, filename, and action buttons don't crowd each other */
      margin: 0;
      padding: 0;
    }

    .toolbar-links > li {
      display: flex;
      align-items: center;
    }

    .mode-tabs {
      display: flex;
      gap: 0.25rem;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 0.25rem;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: rgba(244, 244, 245, 0.65);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .mode-tab:hover {
      color: #f4f4f5;
    }

    .mode-tab.active {
      background: #2a2c33;
      color: #f4f4f5;
    }

    .toolbar-filename {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(244, 244, 245, 0.85);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      outline: none;
      min-width: 8ch;
      max-width: 22ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar-filename:focus {
      background: rgba(255, 255, 255, 0.08);
    }

    .editor-toolbar .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: rgba(244, 244, 245, 0.85);
      padding: 0.45rem 0.9rem;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .editor-toolbar .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: #ffffff;
    }

    .editor-toolbar .btn-primary {
      background: #f59e0b; /* amber — distinct call-to-action color from the marketing page's indigo primary */
      color: #17181c;
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .editor-toolbar .btn-primary:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    @media (max-width: 780px) {
      .editor-toolbar {
        padding: 0 1rem;
      }
      .toolbar-links {
        gap: 0.9rem;
      }
      .toolbar-filename {
        display: none; /* keep tabs + action buttons, drop the editable title on narrow screens */
      }
    }
  </style>
</head>
<body>

  <header class="editor-toolbar">
    <a href="index.html" class="nav-logo"><span class="logo-dot"></span>résumé</a>
    <ul class="toolbar-links">
      <li>
        <div class="mode-tabs" role="tablist">
          <button class="mode-tab active" id="tabEditBtn">Edit</button>
          <button class="mode-tab" id="tabCustomizeBtn">Customize</button>
        </div>
      </li>
      <li>
        <span class="toolbar-filename" id="resumeTitle" contenteditable="true" spellcheck="false">Untitled résumé</span>
      </li>
      <li><button class="btn btn-ghost btn-sm" id="btnDownloadPDF">⬇ PDF</button></li>
      <li><button class="btn btn-ghost btn-sm" id="btnOpenPortfolio">🌐 Portfolio</button></li>
      <li><button class="btn btn-primary btn-sm" id="btnPublishShowcase">✦ Publish</button></li>
    </ul>
  </header>

  <main class="editor-workspace">
    
    <section class="editor-sidebar" id="editorSidebar">
      
      <div class="sidebar-panel active" id="panelEdit">
        <div class="panel-scroll-container">
          
          <div class="form-section active">
            <button class="form-section-toggle" type="button">
              <span class="fs-title">Personal Details</span>
              <span class="fs-chevron">▼</span>
            </button>
            <div class="form-section-content">
              <div class="form-grid">
                <div class="field-box full-width">
                  <label>Wanted Job Title</label>
                  <input type="text" id="inJobTitle" placeholder="e.g. Software Engineer" />
                </div>
                <div class="field-box">
                  <label>First Name</label>
                  <input type="text" id="inFirstName" />
                </div>
                <div class="field-box">
                  <label>Last Name</label>
                  <input type="text" id="inLastName" />
                </div>
                <div class="field-box">
                  <label>Email</label>
                  <input type="email" id="inEmail" />
                </div>
                <div class="field-box">
                  <label>Phone</label>
                  <input type="tel" id="inPhone" />
                </div>
                <div class="field-box">
                  <label>Address</label>
                  <input type="text" id="inAddress" />
                </div>
                <div class="field-box" id="photoUploadBox">
                  <label>Photo</label>
                  <div class="photo-input-row">
                    <div class="photo-preview-placeholder" id="photoSidebarPreview"></div>
                    <label class="btn btn-ghost btn-sm btn-file">
                      Upload Image <input type="file" id="inPhoto" accept="image/*" style="display:none;" />
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="sections-manager-wrap">
            <h3 class="sm-title">Résumé Sections</h3>
            <p class="sm-subtitle">Drag to reorder sections. Click to modify block parameters.</p>
            <div class="sections-drag-list" id="sidebarSectionsList">
              </div>
          </div>
          
        </div>
      </section>

      <div class="sidebar-resizer" id="sidebarResizer"></div>

      <section class="editor-canvas" id="canvasWrap">
        <div class="canvas-container">
          <div class="resume-paper" id="resumePaper" data-layout="1" data-header-align="left" data-date-align="right" data-skills-layout="pills">
            
            <header class="rb-header" id="canvasHeader">
              <div class="rb-header-photo-wrap hidden" id="canvasPhotoWrap">
                <img src="" alt="Profile" id="canvasPhotoImg" />
              </div>
              <div class="rb-header-text">
                <h1 class="rb-name" id="canvasName">Juan Lala</h1>
                <div class="rb-title" id="canvasJobTitle"></div>
                <div class="rb-contact-line" id="canvasContactLine"></div>
              </div>
            </header>

            <div id="canvasTracks" class="tracks-layout-1">
              <div class="col-track main-track" id="mainTrack"></div>
              <div class="col-track side-track hidden" id="sideTrack"></div>
            </div>

          </div>
        </div>
      </section>

  </main>

  <script type="module" src="editor.js"></script>
</body>
</html>
