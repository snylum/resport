<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resport Creator — Admin Panel</title>
  
  <!-- UI Core Engine Utility Styles -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="editor.css">
  
  <style>
    /* Gumroad Stark Minimalist Aesthetic Rules */
    .brutalist-border {
      border: 2px solid #000000;
    }
    .brutalist-shadow {
      box-shadow: 4px 4px 0px #000000;
    }
    .brutalist-shadow-sm {
      box-shadow: 2px 2px 0px #000000;
    }
    .preview-window {
      min-height: 460px;
    }
  </style>
</head>
<body class="bg-[#f4f4f0] text-black font-sans min-h-screen flex flex-col">

  <!-- PERFECT REPLICA HEADER (Matching index.html structural layout) -->
  <header class="bg-white border-b-2 border-black px-8 py-6 flex justify-between items-center z-50">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Profile settings</h1>
      <nav class="flex gap-6 mt-4 text-sm font-medium">
        <a href="#" class="text-gray-500 hover:text-black transition-colors">About</a>
        <a href="#" class="border-b-2 border-black pb-1 px-1 font-semibold text-black">Pages</a>
        <a href="#" class="text-gray-500 hover:text-black transition-colors">Share</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-xs text-gray-500 bg-gray-100 px-2.5 py-1 rounded-full font-mono">Status: Connected</span>
      <button class="bg-[#ff5c00] text-white font-bold px-6 py-2.5 brutalist-border brutalist-shadow transition-transform hover:-translate-x-0.5 hover:-translate-y-0.5 active:translate-x-0 active:translate-y-0">
        Update profile
      </button>
    </div>
  </header>

  <!-- WORKSPACE INTERFACE SPLIT -->
  <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 overflow-hidden">
    
    <!-- LEFT PANEL: Dynamic Section Component Block Controls -->
    <section class="lg:col-span-7 p-8 overflow-y-auto border-r-2 border-black bg-white">
      <div class="max-w-2xl mx-auto">
        <h2 class="text-xl font-bold mb-1">Pages</h2>
        <p class="text-gray-600 text-sm mb-6">Each item represents an active content category tab running live on your public site page profile.</p>

        <!-- Parent Insertion Node for Script Initialization Engine -->
        <div id="sections-container" class="space-y-4">
          <!-- Populated programmatically by local application state array mapping loops -->
        </div>

        <!-- Section Append Button Element Trigger -->
        <button onclick="addSection()" class="mt-6 w-full bg-white text-black font-bold py-3.5 brutalist-border brutalist-shadow-sm hover:bg-gray-50 flex items-center justify-center gap-2 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add new section
        </button>
      </div>
    </section>

    <!-- RIGHT PANEL: Live Updating Document Mockup Sandbox -->
    <section class="lg:col-span-5 p-8 bg-[#f4f4f0] overflow-y-auto flex flex-col justify-start">
      <div class="sticky top-8 w-full max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500">Live Preview</h3>
          <button class="bg-white p-2 brutalist-border brutalist-shadow-sm hover:bg-gray-50 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          </button>
        </div>

        <!-- Render View Frame Window Container -->
        <div class="bg-white w-full brutalist-border brutalist-shadow preview-window flex flex-col p-6 justify-between">
          <div>
            <!-- Simulated Nav Header Bar -->
            <div class="flex justify-between items-center border-b-2 border-black pb-3 mb-4">
              <span class="font-extrabold text-sm tracking-tight" id="preview-brand">alexrivera.dev</span>
              <span class="text-[10px] uppercase font-mono font-bold text-white bg-black px-2 py-0.5 tracking-wider">Proof of Work</span>
            </div>
            
            <!-- Dynamically Generated Tab Navigation Elements -->
            <div id="preview-tabs" class="flex gap-4 text-xs font-bold border-b border-gray-200 pb-2 mb-4 overflow-x-auto whitespace-nowrap">
              <!-- Rendered via state synchronization cycle -->
            </div>

            <!-- Dynamic Section Markdown/Text Node Output Surface Area -->
            <div id="preview-body">
              <!-- Rendered via state synchronization cycle -->
            </div>
          </div>

          <!-- Sandbox Profile Stamp Footer Layout component -->
          <div class="pt-6 border-t border-gray-200 flex justify-center">
            <span class="text-[10px] text-gray-400 tracking-tight flex items-center gap-1 font-mono">
              Powered by <span class="font-black text-black tracking-normal">resport</span>
            </span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- External Script Binding hooks logic integration path -->
  <script src="editor.js"></script>
  <script>
    // State machine layout configuration backup structure fallback logic 
    let profileState = {
      sections: [
        { id: "s1", name: "Featured Projects", content: "⚡ Built edge microservices on Cloudflare Workers\n📦 Maintained pixel-art graphic engine asset pipelines\n🔥 Shipped open-source configurations via GitHub Actions" },
        { id: "s2", name: "Core Stack", content: "Languages: JS, HTML, CSS, Bash\nPlatforms: Cloudflare, GitHub, Pages Devs" }
      ]
    };

    function init() {
      renderEditor();
      renderPreview();
    }

    function renderEditor() {
      const container = document.getElementById('sections-container');
      container.innerHTML = '';

      profileState.sections.forEach((section, index) => {
        const block = `
          <div class="bg-white brutalist-border p-5 relative space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
              <div class="flex items-center gap-2">
                <span class="text-gray-400 font-mono select-none">::</span>
                <span class="font-bold text-xs text-gray-500 uppercase tracking-wider">Tab Section Module</span>
              </div>
              <div class="flex gap-1">
                <button onclick="moveSection(${index}, -1)" class="p-1 px-2 border border-black hover:bg-gray-100 rounded text-xs font-bold disabled:opacity-30" ${index === 0 ? 'disabled' : ''}>▲</button>
                <button onclick="moveSection(${index}, 1)" class="p-1 px-2 border border-black hover:bg-gray-100 rounded text-xs font-bold disabled:opacity-30" ${index === profileState.sections.length - 1 ? 'disabled' : ''}>▼</button>
                <button onclick="deleteSection('${section.id}')" class="p-1 px-2 border border-black hover:bg-red-50 text-red-600 rounded text-xs font-bold ml-2">🗑️</button>
              </div>
            </div>

            <div>
              <label class="block text-xs font-bold uppercase mb-1 text-gray-700">Section name</label>
              <input type="text" value="${escapeHtml(section.name)}" 
                     oninput="updateSectionContent('${section.id}', 'name', this.value)"
                     class="w-full p-2.5 brutalist-border focus:outline-none focus:bg-gray-50 font-medium" 
                     placeholder="e.g. Open Source, Experience, About">
            </div>

            <div>
              <label class="block text-xs font-bold uppercase mb-1 text-gray-700">Achievements / Proof of work description text</label>
              <textarea rows="3" 
                        oninput="updateSectionContent('${section.id}', 'content', this.value)"
                        class="w-full p-2.5 brutalist-border focus:outline-none focus:bg-gray-50 text-xs font-mono leading-relaxed" 
                        placeholder="Write clean accomplishments...">${escapeHtml(section.content)}</textarea>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', block);
      });
    }

    function renderPreview() {
      const tabsContainer = document.getElementById('preview-tabs');
      const bodyContainer = document.getElementById('preview-body');
      
      tabsContainer.innerHTML = '';
      bodyContainer.innerHTML = '';

      if (profileState.sections.length === 0) {
        bodyContainer.innerHTML = '<p class="text-xs text-gray-400 italic font-mono">No pages published yet.</p>';
        return;
      }

      profileState.sections.forEach((section, index) => {
        const tab = document.createElement('span');
        tab.className = index === 0 ? "text-black border-b-2 border-black pb-1 cursor-pointer" : "text-gray-400 cursor-pointer hover:text-black";
        tab.textContent = section.name || "Untitled Page";
        tabsContainer.appendChild(tab);

        if (index === 0) {
          const content = document.createElement('div');
          content.className = "text-xs text-gray-800 whitespace-pre-line leading-relaxed font-mono bg-gray-50 p-4 brutalist-border";
          content.textContent = section.content || "No information detailed within this tab segment module yet.";
          bodyContainer.appendChild(content);
        }
      });
    }

    function updateSectionContent(id, key, value) {
      const sec = profileState.sections.find(s => s.id === id);
      if (sec) {
        sec[key] = value;
        renderPreview();
      }
    }

    function addSection() {
      profileState.sections.push({
        id: Date.now().toString(),
        name: "New Project Showcase",
        content: "• Highlight an achievement, metric, or live link connection here."
      });
      renderEditor();
      renderPreview();
    }

    function deleteSection(id) {
      profileState.sections = profileState.sections.filter(s => s.id !== id);
      renderEditor();
      renderPreview();
    }

    function moveSection(index, direction) {
      const target = index + direction;
      if (target >= 0 && target < profileState.sections.length) {
        const hold = profileState.sections[index];
        profileState.sections[index] = profileState.sections[target];
        profileState.sections[target] = hold;
        renderEditor();
        renderPreview();
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    window.onload = init;
  </script>
</body>
</html>
