<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f0f0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

#sidebar {
  width: 220px;
  background: #1a1a2e;
  color: white;
  padding: 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  flex-shrink: 0;
}

#sidebar h2 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid #333;
}

.add-btn {
  background: #16213e;
  color: #e0e0e0;
  border: 1px solid #333;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  font-size: 13px;
  transition: background 0.15s;
}
.add-btn:hover { background: #0f3460; border-color: #4a90e2; color: white; }
.add-btn span { margin-right: 6px; }

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#toolbar {
  background: white;
  border-bottom: 1px solid #ddd;
  padding: 10px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}

#toolbar h1 {
  font-size: 15px;
  font-weight: 600;
  color: #333;
  margin-right: auto;
}

.toolbar-btn {
  background: #f5f5f5;
  border: 1px solid #ddd;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: #444;
}
.toolbar-btn:hover { background: #e8e8e8; }
.toolbar-btn.primary {
  background: #4a90e2;
  color: white;
  border-color: #4a90e2;
}
.toolbar-btn.primary:hover { background: #357abd; }

select.toolbar-btn { padding: 5px 10px; }

#canvas-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 40px;
  display: flex;
  justify-content: center;
}

/* The resume paper */
#resume {
  width: 680px;
  min-height: 880px;
  background: white;
  padding: 52px 60px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  font-family: 'Times New Roman', Times, serif;
  position: relative;
}

/* Block wrapper */
.block-wrap { position: relative; }
.block-wrap:hover .block-controls { opacity: 1; }

.block-controls {
  position: absolute;
  right: -44px;
  top: 0;
  opacity: 0;
  transition: opacity 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.bc-btn {
  width: 28px;
  height: 28px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
}
.bc-btn:hover { background: #fee; border-color: #f99; color: #c00; }
.bc-btn.move:hover { background: #eef; border-color: #99f; color: #339; }

/* Harvard theme blocks */
.resume-header { text-align: center; margin-bottom: 6px; }

.resume-name {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 0.04em;
  outline: none;
  min-height: 28px;
}

.resume-contact {
  font-size: 11px;
  color: #333;
  margin-top: 4px;
  outline: none;
  min-height: 16px;
}

.resume-section-title {
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1.5px solid #000;
  padding-bottom: 2px;
  margin-top: 14px;
  margin-bottom: 6px;
  outline: none;
  min-height: 18px;
}

.resume-experience { margin-bottom: 8px; }

.exp-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.exp-company { font-weight: bold; font-size: 12px; outline: none; min-width: 40px; }
.exp-dates   { font-size: 11px; color: #333; outline: none; min-width: 40px; text-align: right; }
.exp-role    { font-size: 12px; font-style: italic; outline: none; min-width: 40px; }
.exp-loc     { font-size: 11px; color: #333; outline: none; min-width: 40px; text-align: right; }

.exp-bullets { margin-top: 3px; padding-left: 16px; font-size: 11.5px; line-height: 1.5; }
.exp-bullet  { outline: none; margin-bottom: 1px; }

.add-bullet-btn {
  font-size: 11px;
  margin-top: 3px;
  background: none;
  border: 1px dashed #bbb;
  padding: 2px 8px;
  cursor: pointer;
  border-radius: 4px;
  color: #888;
  font-family: inherit;
}
.add-bullet-btn:hover { border-color: #4a90e2; color: #4a90e2; }

.resume-education {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 12px;
}
.edu-school { font-weight: bold; outline: none; }
.edu-degree { font-style: italic; outline: none; }
.edu-right  { text-align: right; font-size: 11px; color: #333; }
.edu-right div { outline: none; }

.resume-text {
  font-size: 11.5px;
  line-height: 1.6;
  outline: none;
  min-height: 16px;
}

.resume-spacer { height: 14px; }

.hire-me-wrap { text-align: center; margin: 16px 0 8px; }
.hire-me-btn {
  display: inline-block;
  background: #1a1a2e;
  color: white;
  padding: 12px 32px;
  border-radius: 6px;
  font-size: 15px;
  font-family: -apple-system, sans-serif;
  font-weight: 600;
  cursor: pointer;
  border: none;
  text-decoration: none;
  outline: none;
}
</style>
</head>
<body>

<div id="sidebar">
  <h2>Add block</h2>
  <button class="add-btn" onclick="addBlock('header')"><span>👤</span> Name / Header</button>
  <button class="add-btn" onclick="addBlock('section')"><span>📌</span> Section Title</button>
  <button class="add-btn" onclick="addBlock('experience')"><span>💼</span> Experience</button>
  <button class="add-btn" onclick="addBlock('education')"><span>🎓</span> Education</button>
  <button class="add-btn" onclick="addBlock('text')"><span>📝</span> Text</button>
  <button class="add-btn" onclick="addBlock('spacer')"><span>↕️</span> Spacer</button>
  <button class="add-btn" onclick="addBlock('hireme')"><span>✋</span> Hire Me Button</button>
</div>

<div id="main">
  <div id="toolbar">
    <h1>✏️ Resume Editor</h1>
    <select id="template-select" class="toolbar-btn" onchange="applyTemplate(this.value)">
      <option value="harvard">Harvard Style</option>
      <option value="modern">Modern (soon)</option>
      <option value="minimal">Minimal (soon)</option>
    </select>
    <button class="toolbar-btn" onclick="downloadPDF()">⬇ PDF</button>
    <button class="toolbar-btn" onclick="downloadDOCX()">⬇ Word</button>
    <button class="toolbar-btn primary">🌐 Publish (Pro)</button>
  </div>
  <div id="canvas-wrap">
    <div id="resume"></div>
  </div>
</div>

<script>
let blocks = [
  { id: 1, type: 'header', data: {
      name: 'Your Full Name',
      contact: 'email@example.com  ·  +63 912 345 6789  ·  linkedin.com/in/you  ·  City, PH'
  }},
  { id: 2, type: 'section', data: { title: 'Education' }},
  { id: 3, type: 'education', data: {
      school: 'University of the Philippines',
      degree: 'B.S. Computer Science',
      location: 'Diliman, Quezon City',
      year: 'June 2024',
      gpa: 'GPA: 1.50'
  }},
  { id: 4, type: 'section', data: { title: 'Experience' }},
  { id: 5, type: 'experience', data: {
      company: 'Tech Company Inc.',
      dates: 'Jan 2024 – Present',
      role: 'Software Engineer',
      location: 'Makati, PH',
      bullets: [
        'Built and shipped a feature used by 10,000+ users.',
        'Led a team of 3 engineers to deliver on schedule.'
      ]
  }},
  { id: 6, type: 'section', data: { title: 'Skills' }},
  { id: 7, type: 'text', data: { content: 'JavaScript, React, Node.js, Python, SQL, Cloudflare Workers, Git' }},
  { id: 8, type: 'spacer', data: {} },
  { id: 9, type: 'hireme', data: { label: 'Hire Me', url: '#' }},
];
let nextId = 10;

function render() {
  const resume = document.getElementById('resume');
  resume.innerHTML = '';
  blocks.forEach((block, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'block-wrap';
    wrap.innerHTML = blockHTML(block, i) + controlsHTML(i);
    resume.appendChild(wrap);
  });
}

function blockHTML(b, i) {
  const d = b.data;
  switch (b.type) {

    case 'header':
      return `<div class="resume-header">
        <div class="resume-name" contenteditable="true"
          onblur="save(${b.id},'name',this.innerText)">${d.name}</div>
        <div class="resume-contact" contenteditable="true"
          onblur="save(${b.id},'contact',this.innerText)">${d.contact}</div>
      </div>`;

    case 'section':
      return `<div class="resume-section-title" contenteditable="true"
        onblur="save(${b.id},'title',this.innerText)">${d.title}</div>`;

    case 'experience':
      const bullets = d.bullets.map((bl, bi) =>
        `<li class="exp-bullet" contenteditable="true"
          onblur="saveBullet(${b.id},${bi},this.innerText)">${bl}</li>`
      ).join('');
      return `<div class="resume-experience">
        <div class="exp-row">
          <span class="exp-company" contenteditable="true"
            onblur="save(${b.id},'company',this.innerText)">${d.company}</span>
          <span class="exp-dates" contenteditable="true"
            onblur="save(${b.id},'dates',this.innerText)">${d.dates}</span>
        </div>
        <div class="exp-row">
          <span class="exp-role" contenteditable="true"
            onblur="save(${b.id},'role',this.innerText)">${d.role}</span>
          <span class="exp-loc" contenteditable="true"
            onblur="save(${b.id},'location',this.innerText)">${d.location}</span>
        </div>
        <ul class="exp-bullets">${bullets}</ul>
        <button class="add-bullet-btn" onclick="addBullet(${b.id})">+ add bullet</button>
      </div>`;

    case 'education':
      return `<div class="resume-education">
        <div>
          <div class="edu-school" contenteditable="true"
            onblur="save(${b.id},'school',this.innerText)">${d.school}</div>
          <div class="edu-degree" contenteditable="true"
            onblur="save(${b.id},'degree',this.innerText)">${d.degree}</div>
        </div>
        <div class="edu-right">
          <div contenteditable="true"
            onblur="save(${b.id},'location',this.innerText)">${d.location}</div>
          <div contenteditable="true"
            onblur="save(${b.id},'year',this.innerText)">${d.year}</div>
          <div contenteditable="true"
            onblur="save(${b.id},'gpa',this.innerText)">${d.gpa}</div>
        </div>
      </div>`;

    case 'text':
      return `<div class="resume-text" contenteditable="true"
        onblur="save(${b.id},'content',this.innerText)">${d.content}</div>`;

    case 'spacer':
      return `<div class="resume-spacer"></div>`;

    case 'hireme':
      return `<div class="hire-me-wrap">
        <a class="hire-me-btn" href="${d.url}" contenteditable="true"
          onblur="save(${b.id},'label',this.innerText)">${d.label}</a>
      </div>`;

    default: return '';
  }
}

function controlsHTML(i) {
  return `<div class="block-controls">
    ${i > 0
      ? `<button class="bc-btn move" onclick="moveBlock(${i},-1)" title="Move up">↑</button>`
      : ''}
    ${i < blocks.length - 1
      ? `<button class="bc-btn move" onclick="moveBlock(${i},1)" title="Move down">↓</button>`
      : ''}
    <button class="bc-btn" onclick="deleteBlock(${i})" title="Delete">✕</button>
  </div>`;
}

function save(id, key, val) {
  const b = blocks.find(b => b.id === id);
  if (b) b.data[key] = val;
}

function saveBullet(id, index, val) {
  const b = blocks.find(b => b.id === id);
  if (b) b.data.bullets[index] = val;
}

function addBullet(id) {
  const b = blocks.find(b => b.id === id);
  if (b) { b.data.bullets.push('New bullet point.'); render(); }
}

function addBlock(type) {
  const defaults = {
    header:     { name: 'Your Name', contact: 'email@example.com · Phone · City' },
    section:    { title: 'Section Title' },
    experience: { company: 'Company', dates: '2024 – Present', role: 'Your Role',
                  location: 'City, PH', bullets: ['Describe what you did here.'] },
    education:  { school: 'University', degree: 'Degree', location: 'City', year: '2024', gpa: '' },
    text:       { content: 'Type your text here.' },
    spacer:     {},
    hireme:     { label: 'Hire Me', url: '#' },
  };
  blocks.push({ id: nextId++, type, data: { ...defaults[type] } });
  render();
}

function moveBlock(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= blocks.length) return;
  [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
  render();
}

function deleteBlock(i) {
  if (confirm('Delete this block?')) { blocks.splice(i, 1); render(); }
}

function applyTemplate(t) {
  if (t !== 'harvard') alert('More templates coming soon!');
}

function downloadPDF() {
  alert('PDF coming soon — requires Cloudflare Browser Rendering setup.');
}

function downloadDOCX() {
  alert('Word download coming soon.');
}

render();
</script>
</body>
</html>
