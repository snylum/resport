<!DOCTYPE html>
<html lang="en" data-theme="dazed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proves.work — Sell your work. Print your résumé.</title>
  <link rel="stylesheet" href="dazed.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── RESET & LAYOUT ── */
    body {
      margin: 0;
      padding: 0;
      background: var(--color-surface, #ffffff);
      overflow-x: hidden;
    }

    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      box-sizing: border-box;
      z-index: 100;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid var(--color-border, #000000);
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1.25rem;
      text-decoration: none;
      color: var(--color-text, #000000);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--color-primary, #6366f1);
      border-radius: 50%;
    }

    /* ── WIDENED GUMROAD-STYLE HERO ── */
    .hero-header {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6rem 2rem 4rem 2rem;
      text-align: center;
      box-sizing: border-box;
    }

    .brand-container {
      margin-bottom: 1.5rem;
      height: 5rem; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dynamic-subdomain {
      font-family: var(--font-display, 'Courier New', monospace);
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--color-text, #000000);
      margin: 0;
    }

    .dynamic-subdomain em {
      font-style: italic;
      font-weight: 700;
    }

    .tld-accent {
      color: var(--color-primary, #6366f1);
    }

    .hero-tagline {
      font-size: 1.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted, #4b5563);
      margin: 0.5rem 0 0 0;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .hero-tagline.visible {
      opacity: 1;
    }

    .hero-actions {
      margin-top: 3.5rem;
      display: flex;
      gap: 1rem;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    
    .hero-actions.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <span class="logo-dot"></span>proves.work
    </a>
    <ul class="nav-links" style="list-style: none; display: flex; gap: 1.5rem; margin: 0; padding: 0; align-items: center;">
      <li><a href="#" style="text-decoration: none; color: var(--color-text-muted); font-weight: 500;">Dashboard Preview</a></li>
      <li><a href="#" class="btn btn-primary btn-sm">Start Publishing →</a></li>
    </ul>
  </nav>

  <header class="hero-header">
    <div class="brand-container">
      <h1 class="dynamic-subdomain" id="tickerTarget">
        claims<span class="tld-accent">.work</span>
      </h1>
    </div>

    <p class="hero-tagline" id="taglineTarget">Stop claiming. Start proving.</p>

    <div class="hero-actions" id="actionsTarget">
      <a href="#" class="btn btn-primary btn-lg">Create Your Shop & Résumé</a>
      <a href="#" class="btn btn-ghost btn-lg">View Templates</a>
    </div>
  </header>

  <!-- RE-ENGINEERED STEP TICKER CONSOLE -->
  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      const tickerTarget = document.getElementById('tickerTarget');
      const taglineTarget = document.getElementById('taglineTarget');
      const actionsTarget = document.getElementById('actionsTarget');

      const names = [
        "luca", "lebron", "leni", "juan", "yuki", 
        "mei", "aarav", "sofia", "kwame", "amélie", 
        "nikolai", "tariq", "chloe", "mateo", "soraya", 
        "sven", "ji-woo", "kenji", "anya", "oxana", "your-name"
      ];

      let currentIndex = 0;
      const normalIntervalTime = 125; 
      let tickerInterval;

      function runTicker() {
        if (currentIndex < names.length) {
          const currentName = names[currentIndex];
          
          if (currentName === "your-name") {
            // Italicize "your-name" and pause execution context for 3000ms
            tickerTarget.innerHTML = `<em>your-name</em><span class="tld-accent">.proves.work</span>`;
            currentIndex++;
            
            setTimeout(() => {
              resolveToFinalState();
            }, 3000);
          } else {
            // Regular quick-cycling names
            tickerTarget.innerHTML = `${currentName}<span class="tld-accent">.proves.work</span>`;
            currentIndex++;
            tickerInterval = setTimeout(runTicker, normalIntervalTime);
          }
        }
      }

      // Start the loop sequence
      tickerInterval = setTimeout(runTicker, normalIntervalTime);

      function resolveToFinalState() {
        tickerTarget.innerHTML = `proves<span class="tld-accent">.work</span>`;
        
        setTimeout(() => {
          taglineTarget.classList.add('visible');
        }, 150);

        setTimeout(() => {
          actionsTarget.classList.add('visible');
        }, 450);
      }
    });
  </script>

</body>
</html>
