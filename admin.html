<!DOCTYPE html>
<html lang="en" data-theme="dazed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proves.work — Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="dazed.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <nav class="site-nav">
    <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none;">proves.work</a> <span style="opacity:.55;font-weight:600;">/ admin</span></div>
    <ul class="nav-links"><li id="adminAccountSlot"></li></ul>
  </nav>

  <main class="admin-main">
    <div id="adminGate" class="admin-gate">
      <h1 class="admin-heading">Admin dashboard</h1>
      <p class="modal-sub">Sign in with the admin Google account to review claims and donations.</p>
      <div id="adminSignInSlot"></div>
      <p class="username-status" id="adminGateStatus"></p>
    </div>

    <div id="adminPanel" class="admin-panel hidden">
      <div class="admin-toolbar">
        <h1 class="admin-heading">Admin dashboard</h1>
        <button class="btn btn-ghost btn-sm" id="adminRefreshBtn" type="button">↻ Refresh</button>
      </div>

      <div class="admin-view-tabs">
        <button class="admin-view-tab active" data-view="claims" type="button">🗂️ Claims</button>
        <button class="admin-view-tab" data-view="donations" type="button">💗 Donations</button>
      </div>

      <p class="username-status" id="adminListStatus"></p>

      <div id="claimsView" class="admin-view">
        <div class="admin-tabs">
          <button class="admin-tab active" data-filter="pending" type="button">Pending review</button>
          <button class="admin-tab" data-filter="live" type="button">Live</button>
          <button class="admin-tab" data-filter="rejected" type="button">Rejected</button>
          <button class="admin-tab" data-filter="all" type="button">All</button>
        </div>
        <div id="claimsList" class="admin-sites-list"></div>
      </div>

      <div id="donationsView" class="admin-view hidden">
        <p class="modal-sub" style="margin-top:0;">
          Confirm a reference number against your own payment history, then optionally tag that
          subdomain straight into the public showcase.
        </p>
        <div id="donationsList" class="admin-sites-list"></div>
      </div>

      <div id="adminDots" class="admin-scroll-dots hidden" aria-label="Scroll position"></div>
    </div>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
