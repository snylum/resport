<!DOCTYPE html>
<html lang="en" data-theme="dazed">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>proves.work — Manage your address</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="dazed.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="manage.css" />
</head>
<body>
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">proves.work <span style="opacity:.55;font-weight:600;">/ manage</span></a>
    <ul class="nav-links">
      <li><a href="editor.html">Editor</a></li>
      <li><a href="showcase.html">Showcase</a></li>
    </ul>
  </nav>

  <main class="manage-main">
    <div id="manageGate" class="manage-gate">
      <h1 class="manage-heading">Manage your address</h1>
      <p class="manage-sub">Sign in with the Google account you used to reserve your username.proves.work address to check your payment status or point it at an existing page.</p>
      <div id="manageSignInSlot"></div>
      <p class="username-status" id="manageGateStatus"></p>
    </div>

    <div id="managePanel" class="manage-panel hidden">
      <div class="manage-toolbar">
        <h1 class="manage-heading">Your addresses</h1>
        <span id="manageAccountEmail" class="manage-account-email"></span>
      </div>
      <p class="username-status" id="manageListStatus"></p>
      <div id="manageSitesList" class="manage-sites-list"></div>
    </div>
  </main>

  <!-- RENEWAL REMINDER POPUP — warns an owner ~2 weeks out that a
       paid address is about to lapse back to Free tier / go offline. -->
  <div class="domain-modal-overlay hidden" id="renewalReminderOverlay">
    <div class="domain-modal" id="renewalReminderContent"></div>
  </div>
  <style>
    .domain-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 1rem;
    }
    .domain-modal-overlay.hidden { display: none; }
    .domain-modal {
      background: var(--color-surface, #fff);
      border: 2px solid var(--color-border, #000);
      box-shadow: var(--shadow, 6px 6px 0 0 #000);
      padding: 2rem; width: 100%; max-width: 420px; position: relative;
    }
    .domain-modal h3 { margin: 0 0 0.5rem; font-family: var(--font-display); font-size: 1.2rem; }
    .domain-modal p.sub { margin: 0 0 1.25rem; color: var(--color-text-muted, #6b7280); font-size: 0.9rem; }
    .domain-modal .actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1rem; }
    .domain-modal .close-x {
      position: absolute; top: 0.75rem; right: 1rem; background: none; border: none;
      font-size: 1.2rem; cursor: pointer; color: var(--color-text-muted, #6b7280);
    }
  </style>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="manage.js"></script>
</body>
</html>
